<!DOCTYPE html>
<html lang="{{ site.locale | default: 'en' }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }} | {{ site.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{{ page.excerpt | default: site.description | strip_html | truncatewords: 50 }}">
  <link rel="canonical" href="{{ page.url | absolute_url }}">
  <link rel="alternate" type="application/rss+xml" title="{{ site.title }}" href="{{ '/feed.xml' | absolute_url }}">
  <link rel="stylesheet" href="{{ '/assets/main.css' | relative_url }}">
  <script src="{{ '/assets/dark-mode.js' | relative_url }}"></script>
  {% if site.google_adsense %}
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client={{ site.google_adsense }}" crossorigin="anonymous"></script>
  {% endif %}
</head>
<body>
  {% include header.html %}
  <main class="site-main">
    <div class="site-main__inner">
      {{ content }}
    </div>
  </main>
  {% include footer.html %}
</body>
</html>
